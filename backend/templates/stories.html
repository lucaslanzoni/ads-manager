<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
{{fontLink}}
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1920px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    font-family: {{fontFamily}};
    background: #0a0a0c;
  }

  .photo-zone {
    flex: 0 0 1200px;
    overflow: hidden;
  }

  .photo-zone img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .accent {
    height: 6px;
    background: {{primaryColor}};
    flex-shrink: 0;
  }

  .text-zone {
    flex: 1;
    background: #0a0a0c;
    padding: 56px 80px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 24px;
  }

  .logo {
    height: 52px;
    width: auto;
    object-fit: contain;
    object-position: left;
  }

  .headline {
    font-size: {{headlineSize}}px;
    font-weight: 800;
    color: #f2f2f4;
    line-height: 1.05;
    letter-spacing: -0.025em;
  }

  .copy {
    font-size: 42px;
    font-weight: 400;
    color: rgba(242,242,244,0.6);
    line-height: 1.4;
  }
</style>
</head>
<body>
  <div class="photo-zone"><img src="{{photo}}" /></div>
  <div class="accent"></div>
  <div class="text-zone">
    {{#if logo}}<img class="logo" src="{{logo}}" />{{/if}}
    {{#if headline}}<div class="headline">{{headline}}</div>{{/if}}
    {{#if copy}}<div class="copy">{{copy}}</div>{{/if}}
  </div>
</body>
</html>
